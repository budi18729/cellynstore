name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Compile all Python (syntax check)
        run: python -m compileall -q cogs utils main.py admin.py

      - name: Lint (syntax errors & undefined names)
        # Gate ketat untuk error nyata yang bikin bot crash:
        #   E9  = syntax error
        #   F821 = undefined name
        #   F811 = redefinisi (mis. import ganda)
        # Catatan: unused-import (F401) & unused-var (F841) belum di-gate di sini
        # supaya CI hijau; dibersihkan di PR cleanup terpisah.
        run: ruff check --select E9,F821,F811 cogs utils main.py admin.py
